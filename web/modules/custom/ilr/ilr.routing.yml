ilr.course.sfid:
  path: '/course/{sfid}'
  defaults:
    _controller: '\Drupal\ilr\Controller\CourseSalesforceIdRedirect::response'
  requirements:
    _permission: 'access content'
    sfid: '[a-zA-Z0-9]{18}|[a-zA-Z0-9]{15}'
course.feed:
  path: 'programs/professional-education/feed'
  defaults:
    _title: 'JSON Feed'
    _controller: '\Drupal\ilr\Controller\CourseJsonFeed::content'
  requirements:
    _permission: 'access content'
ilr.kissoff_confirm:
  path: '/admin/user/kissoff-confirm'
  defaults:
    _form: '\Drupal\ilr\Form\KissoffConfirm'
    _title: 'Confirm'
  requirements:
    _permission: 'administer users'
