id: ecornell_certificates
label: eCornell certificates
migration_group: default
migration_tags:
  - Custom
source:
  plugin: 'ecornell_remote_program'
  ids:
    - id
  track_changes: true
process:
  uid:
    plugin: default_value
    default_value: 1
  title: title
  body/value: description
  body/format:
    plugin: default_value
    default_value: standard_formatting
  field_course_number: id
  field_delivery_method:
    plugin: default_value
    default_value: 'Asynchronous Online'
  field_date_start: next_course_start_date
  field_external_link: url
  field_topics:
    plugin: static_map
    source: vertical
    map:
      'Human Resources': 7
      'Leadership': 8
      'Other': 4
      'Diversity & Inclusion': 18
      'Business and Finance': 8
    default_value: null
destination:
  plugin: entity:node
  default_bundle: remote_program
  validate: true
  overwrite_properties:
    - title
    - body
    - field_course_number
    - field_date_start
    - field_external_link
    - field_topics
migration_dependencies:
  required: {  }
  optional: {  }
