title: 'NYC Conference Room Request'
description: ''
categories: {  }
elements: |-
  first_name:
    '#type': textfield
    '#title': 'First name'
    '#required': true
  last_name:
    '#type': textfield
    '#title': 'Last name'
    '#required': true
  organization:
    '#type': webform_autocomplete
    '#title': Organization
    '#autocomplete_items': certified_organizations
  email:
    '#type': email
    '#title': Email
    '#required': true
    '#default_value': '[current-user:mail]'
  mobile:
    '#type': tel
    '#title': 'Mobile number'
    '#required': true
  event_name:
    '#type': textfield
    '#title': 'Event Name'
    '#required': true
  event_date:
    '#type': date
    '#title': 'Event Date (Evening and Weekends at an additional cost)'
    '#required': true
  have_alternative_date:
    '#type': radios
    '#title': 'If your date is not available, do you have an alternative date?'
    '#options': yes_no
  event_date_alt:
    '#type': date
    '#title': 'Alternative Event Date'
    '#states':
      visible:
        ':input[name="have_alternative_date"]':
          value: 'Yes'
  room_preference:
    '#type': select
    '#title': 'Room Preference'
    '#options':
      1229: '1229'
      1234: '1234'
      1235: '1235'
      1234/1235: 1234/1235
      1104: '1104'
      1139: '1139'
      1140: '1140'
      cafe: '12th Floor Cafe/Reception Area'
    '#required': true
  av_required:
    '#type': radios
    '#title': 'Will AV be required for the event?'
    '#options': yes_no
  catering_required:
    '#type': checkboxes
    '#title': 'Will catering be required for the event?'
    '#options': mealtimes
  utm_values:
    '#type': utm_values
  ga_client_id:
    '#type': hidden
    '#title': 'GA client id'
    '#attributes':
      id: ga_client_id
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Submit request'
    '#submit__attributes':
      class:
        - cu-button
        - cu-button--alt
