id: yti_newsletter
title: 'YTI Newsletter'
description: '<p>This one is special: It sends info to a custom webhook rather than a touchpoint.&nbsp;</p>'
categories: {  }
elements: |-
  content_container:
    '#type': container
    '#attributes':
      class:
        - form-title
    '#markup': |-
      <h2 class="cu-heading">
        Get in Touch with YTI
      </h2>

      <p><strong>Yang-Tan Institute</strong><br>
      ILR School, Cornell University<br>
      201 Dolgen Hall<br>
      Ithaca, NY 14853</p>

      <p>Phone: 607-255-7727<br>
      Email: <a href="mailto:ilr_yti@cornell.edu">ilr_yti@cornell.edu</a></p>
  element_container:
    '#type': container
    '#attributes':
      class:
        - form-fields
    newsletter_info:
      '#type': processed_text
      '#text': '<h3>YTI Newsletter</h3><p><em>Bringing you disability-related research, policy, events, training, consultation, and more</em></p><p><a href="/yti/newsletter-current">Read newsletter online</a></p>'
      '#format': standard_formatting
    flex_container:
      '#type': container
      '#attributes':
        class:
          - inline-flex
      email:
        '#type': email
        '#title': Email
        '#required': true
      actions:
        '#type': webform_actions
        '#title': 'Submit button(s)'
        '#submit__label': Subscribe
        '#update__label': Subscribe
  ga_client_id:
    '#type': hidden
    '#title': 'GA client id'
    '#attributes':
      id: ga_client_id
